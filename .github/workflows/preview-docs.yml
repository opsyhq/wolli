name: Preview docs

on:
  pull_request:
    paths:
      - "apps/docs/**"
      # The rendered content lives in the wolli package, outside the app.
      - "packages/wolli/docs/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/preview-docs.yml"

concurrency:
  group: preview-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        # The docs app has no workspace dependencies; skip the rest of the repo.
        run: pnpm install --frozen-lockfile --ignore-scripts --filter docs

      # vite build emits dist/ and .wrangler/deploy/config.json, which redirects
      # wrangler to the generated dist/server/wrangler.json (assets + worker).
      - name: Build docs
        run: pnpm --filter docs build

      # versions upload publishes a new version without promoting it to
      # production, and prints a preview URL on the workers.dev subdomain.
      - name: Upload preview version
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/docs
          # Pin to the wrangler that generated the build config to avoid drift.
          wranglerVersion: "4.106.0"
          command: versions upload

      - name: Comment preview URL
        if: steps.preview.outputs.deployment-url != ''
        uses: actions/github-script@v7
        env:
          # This worker serves everything under /docs (zone-route split), so its
          # preview root renders nothing useful; link straight to /docs.
          PREVIEW_URL: ${{ steps.preview.outputs.deployment-url }}/docs
        with:
          script: |
            const marker = "<!-- preview-docs -->";
            const url = process.env.PREVIEW_URL;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = [
              marker,
              "### Docs preview",
              "",
              url,
              "",
              `Updated for ${sha}.`,
            ].join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
