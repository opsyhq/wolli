name: Preview docs

on:
  pull_request:
    paths:
      - "apps/docs/**"
      # The rendered content lives in the wolli package, outside the app.
      - "packages/wolli/docs/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/preview-docs.yml"

concurrency:
  group: preview-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preview:
    # Only same-repo PRs. Fork PRs get no secrets (wrangler couldn't authenticate
    # anyway), and this stops untrusted PR code from running on the runner at all.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        # The docs app has no workspace dependencies; skip the rest of the repo.
        run: pnpm install --frozen-lockfile --ignore-scripts --filter docs

      # vite build emits dist/ and .wrangler/deploy/config.json, which redirects
      # wrangler to the generated dist/server/wrangler.json (assets + worker).
      - name: Build docs
        run: pnpm --filter docs build

      # versions upload publishes a new version without promoting it to
      # production, and prints a preview URL on the workers.dev subdomain.
      - name: Upload preview version
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/docs
          # Pin to the wrangler that generated the build config to avoid drift.
          wranglerVersion: "4.106.0"
          # This worker serves everything under /docs (zone-route split), so the
          # preview URL in the run log renders under <preview>/docs, not the root.
          command: versions upload
